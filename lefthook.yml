# Lefthook configuration.
# Run `lefthook install` once after cloning to activate hooks.
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --verbose
      tags:
        - security
    spotless:
      # Trip wire on staged Java files.
      # Currently runs full-reactor (~10s on warm cache); acceptable for
      # solo dev. To shave to ~3s on single-file commits, swap to:
      #   run: ./mvnw -B -ntp spotless:check -DspotlessFiles="$(echo {staged_files} | tr ' ' ',')"
      # but verify the lefthook {staged_files} quoting handles paths with
      # spaces or special chars correctly first.
      glob: "*.java"
      run: ./mvnw -B -ntp spotless:check
      tags:
        - format
    checkstyle:
      # Lint dimensions only (naming / coding bugs / metrics warnings).
      # Triggers in `validate` phase regardless of -pl scope (~1s).
      glob: "*.java"
      run: ./mvnw -B -ntp checkstyle:check
      tags:
        - lint

# Conventional Commits enforcement at commit time.
# Regex-based check (no Node dependency) — full ruleset runs in CI via
# wagoid/commitlint-github-action. PR title also validated by
# amannn/action-semantic-pull-request (load-bearing for release-please
# since we squash merge with PR title as commit message).
commit-msg:
  commands:
    conventional-format:
      run: |
        head -1 "{1}" | grep -qE '^(feat|fix|docs|chore|refactor|style|test|perf|build|ci|revert)(\(.+\))?!?: .{1,100}$' \
          || (echo "❌ Commit message must follow Conventional Commits:" \
              && echo "   <type>(<scope>): <subject>   (e.g. feat(account): add register endpoint)" \
              && echo "   types: feat fix docs chore refactor style test perf build ci revert" \
              && echo "   subject: 1-100 chars" \
              && exit 1)

# pre-push intentionally NOT configured.
# Rationale: AI-augmented dev (Claude Code) generates most code; pre-commit
# already covers spotless + checkstyle + gitleaks; pre-push's only added
# value would be `mvn test` (compile + test), but currently no business
# tests exist (ArchUnit alone < 1s). 50s+ push wait per push is overhead
# without proportional safety gain. CI is the final defense.
# Re-evaluate when business tests accumulate (PR-3+) and pre-commit-passes-
# but-CI-fails frequency becomes noticeable.
