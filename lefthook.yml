# Lefthook configuration.
# Run `lefthook install` once after cloning to activate hooks.
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --verbose
      tags:
        - security
    spotless:
      # Trip wire on staged Java files.
      # Currently runs full-reactor (~10s on warm cache); acceptable for
      # solo dev. To shave to ~3s on single-file commits, swap to:
      #   run: ./mvnw -B -ntp spotless:check -DspotlessFiles="$(echo {staged_files} | tr ' ' ',')"
      # but verify the lefthook {staged_files} quoting handles paths with
      # spaces or special chars correctly first.
      glob: "*.java"
      run: ./mvnw -B -ntp spotless:check
      tags:
        - format
    checkstyle:
      # Lint dimensions only (naming / coding bugs / metrics warnings).
      # Triggers in `validate` phase regardless of -pl scope (~1s).
      glob: "*.java"
      run: ./mvnw -B -ntp checkstyle:check
      tags:
        - lint

pre-push:
  commands:
    full-verify:
      # Full Maven verify before push: compile + test + spotless +
      # checkstyle + jacoco. Mirrors what CI runs.
      # Skip with `git push --no-verify` for emergencies (CI is the
      # final defense).
      run: ./mvnw -B -ntp verify
      tags:
        - all
