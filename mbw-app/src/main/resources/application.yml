spring:
  application:
    name: mbw

  profiles:
    # Dev is the default when nothing is set (e.g. local `./mvnw spring-boot:run`)
    # so DevCorsConfig (gated on @Profile("dev")) automatically activates and the
    # Expo Web client at localhost:8081 can reach this API. Production deployments
    # MUST set SPRING_PROFILES_ACTIVE=prod (see docker-compose.tight.yml) — without
    # an active override, dev kicks in and CORS opens up to localhost:8081.
    default: dev

  mvc:
    # RFC 9457 ProblemDetail for all error responses (cross-cutting baseline,
    # see GlobalExceptionHandler in mbw-shared.web).
    problemdetails:
      enabled: true

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/mbw}
    username: ${DATASOURCE_USERNAME:mbw}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    schemas: ${FLYWAY_SCHEMAS:shared,account}
    locations:
      - classpath:db/migration/shared
      - classpath:db/migration/account

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  modulith:
    events:
      jdbc-schema-initialization:
        # Disabled — Flyway shared/V3__init_modulith_event_publication.sql
        # creates the table before Hibernate validates the schema. Modulith's
        # built-in initializer runs too late (after validate), causing boot
        # to fail with "missing table [event_publication]".
        enabled: false

  task:
    scheduling:
      # @Scheduled cron expressions (e.g. FrozenAccountAnonymizationScheduler
      # @ "0 0 3 * * *") are evaluated in this zone. Asia/Shanghai matches
      # the production user base; explicit zone keeps cron behaviour stable
      # across host TZ drift.
      timezone: Asia/Shanghai

mbw:
  sms:
    # SMS 通道选择（ADR-0013）：
    #   mock   — MockSmsCodeSender 通过 EmailSender 发邮件给 mock.recipient（M1 默认推荐）
    #   aliyun — AliyunSmsClient（切真 SMS 时启用，营业执照 + 签名审核通过后）
    #   log    — LoggingSmsClient 仅 log（开发期有用）
    #
    # 故意不写 `provider:` 默认值。Spring Boot Relaxed Binding 让 env
    # MBW_SMS_PROVIDER 直接绑到 mbw.sms.provider — 不写默认值的好处是：
    # env 未设时 property 真"absent"，让 LoggingSmsClient 的
    # @ConditionalOnProperty(matchIfMissing=true) 能正确兜底。如果在
    # yml 写 `provider: ${MBW_SMS_PROVIDER:}`，env 未设时值是 ""（不
    # 是 absent），matchIfMissing 不触发 → 三个 SmsClient 都不激活 →
    # 启动 fail。
    mock:
      recipient: ${MOCK_SMS_RECIPIENT:}
      from: ${MOCK_SMS_FROM:}
    # Dev/test 写死 SMS code（生产必须不设此 env！docker-compose.tight.yml 不传）
    # 设此 env（6 位数字）后,RedisSmsCodeService.generateAndStore 跳过随机生成,
    # 直接用此值作 plaintext → 用户直接输此值即可登录,免 redis 注入 magic hash.
    # 触发条件: env 非空 AND 匹配 \d{6}; 否则走 random path（prod 默认行为）。
    # 用法: 本地 dev 起 server 时 export MBW_SMS_DEV_FIXED_CODE=999999（scripts/dev-server.sh 已默认）
    dev-fixed-code: ${MBW_SMS_DEV_FIXED_CODE:}
  email:
    # Email 通道选择（ADR-0013 二次 amend，2026-04-30）：
    #   resend — ResendEmailClient 通过 HTTPS API 发件（生产推荐；Gmail / 国内邮箱投递好）
    #   log    — LoggingEmailSender 仅 log（开发期 / 无 RESEND_API_KEY 兜底）
    #
    # 与 mbw.sms.provider 同样不写默认值 — 让 env 未设时 LoggingEmailSender
    # 的 matchIfMissing=true 正确兜底。
    resend:
      api-key: ${RESEND_API_KEY:}
      base-url: ${RESEND_BASE_URL:https://api.resend.com}
      connect-timeout: ${RESEND_CONNECT_TIMEOUT:5s}
      read-timeout: ${RESEND_READ_TIMEOUT:10s}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        # prometheus exposed for scrape; in prod restrict via Nginx/SLB allowlist
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        # Enable distinct /actuator/health/liveness + /actuator/health/readiness
        # endpoints (k8s / docker compose healthcheck targets at M2).
        enabled: true

logging:
  level:
    root: INFO
    com.mbw: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
