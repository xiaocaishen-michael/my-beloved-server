spring:
  application:
    name: mbw

  mvc:
    # RFC 9457 ProblemDetail for all error responses (cross-cutting baseline,
    # see GlobalExceptionHandler in mbw-shared.web).
    problemdetails:
      enabled: true

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/mbw}
    username: ${DATASOURCE_USERNAME:mbw}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    schemas: ${FLYWAY_SCHEMAS:shared,account}
    locations:
      - classpath:db/migration/account

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  modulith:
    events:
      jdbc-schema-initialization:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        # prometheus exposed for scrape; in prod restrict via Nginx/SLB allowlist
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        # Enable distinct /actuator/health/liveness + /actuator/health/readiness
        # endpoints (k8s / docker compose healthcheck targets at M2).
        enabled: true

logging:
  level:
    root: INFO
    com.mbw: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
