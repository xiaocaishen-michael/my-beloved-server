spring:
  application:
    name: mbw

  mvc:
    # RFC 9457 ProblemDetail for all error responses (cross-cutting baseline,
    # see GlobalExceptionHandler in mbw-shared.web).
    problemdetails:
      enabled: true

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/mbw}
    username: ${DATASOURCE_USERNAME:mbw}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    schemas: ${FLYWAY_SCHEMAS:shared,account}
    locations:
      - classpath:db/migration/shared
      - classpath:db/migration/account

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  mail:
    # M1 mock 通道（ADR-0013）：把验证码发给写死收件人。生产 ECS
    # 在 .env.app 配齐 SMTP_HOST/PORT/USERNAME/PASSWORD；本地 dev 不
    # 配也能起（mailSender 启动时不验证，runtime 失败时由 MockSms-
    # CodeSender 抛 SmsSendException 兜住）。SSL 端口默认 465（阿里
    # 云 / 个人邮箱常用），明文 25 不要在生产用。
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  modulith:
    events:
      jdbc-schema-initialization:
        # Disabled — Flyway shared/V3__init_modulith_event_publication.sql
        # creates the table before Hibernate validates the schema. Modulith's
        # built-in initializer runs too late (after validate), causing boot
        # to fail with "missing table [event_publication]".
        enabled: false

mbw:
  sms:
    # SMS 通道选择（ADR-0013）：
    #   mock   — MockSmsCodeSender 通过 SMTP 发邮件给 mock.recipient（M1 默认推荐）
    #   aliyun — AliyunSmsClient（待 PR #72 merge；切真 SMS 时启用）
    #   log    — LoggingSmsClient 仅 log（开发期有用）
    #
    # 故意不写 `provider:` 默认值。Spring Boot Relaxed Binding 让 env
    # MBW_SMS_PROVIDER 直接绑到 mbw.sms.provider — 不写默认值的好处是：
    # env 未设时 property 真"absent"，让 LoggingSmsClient 的
    # @ConditionalOnProperty(matchIfMissing=true) 能正确兜底。如果在
    # yml 写 `provider: ${MBW_SMS_PROVIDER:}`，env 未设时值是 ""（不
    # 是 absent），matchIfMissing 不触发 → 三个 SmsClient 都不激活 →
    # 启动 fail。
    mock:
      recipient: ${MOCK_SMS_RECIPIENT:}
      from: ${MOCK_SMS_FROM:}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        # prometheus exposed for scrape; in prod restrict via Nginx/SLB allowlist
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        # Enable distinct /actuator/health/liveness + /actuator/health/readiness
        # endpoints (k8s / docker compose healthcheck targets at M2).
        enabled: true

logging:
  level:
    root: INFO
    com.mbw: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
