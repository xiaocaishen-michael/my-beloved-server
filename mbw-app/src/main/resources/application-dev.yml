# Dev profile overrides — picked up automatically when no SPRING_PROFILES_ACTIVE
# is set (application.yml's spring.profiles.default=dev kicks in). Production
# explicitly sets SPRING_PROFILES_ACTIVE=prod (docker-compose.tight.yml) so
# none of this leaks.
spring:
  datasource:
    hikari:
      # 多 feature worktree 并行时 dev 期降低单连接池容量(plan §6.2.2 D6)。
      # 主仓默认 10 conn → 4 feature 并行 × 10 = 40,接近 PG max_connections=100
      # 临界。dev 降 5 conn → 4 feature × 5 = 20,余 80 给 psql/DBeaver/IT。
      maximum-pool-size: 5

mbw:
  auth:
    rate-limit:
      # Production default is 5 attempts per 24h (FR-007 brute-force defence).
      # That cap burns through after a handful of E2E iterations on the same
      # test phone, locking it for 24h. Relax to 50 per hour locally so
      # iterative testing doesn't require manual Redis key deletion between
      # runs. See AuthRateLimitProperties for defaults.
      capacity: 50
      period: 1h

  # Realname verification: dev / test profiles short-circuit the upstream
  # Aliyun cloud-auth call via BypassRealnameClient so iterative work doesn't
  # need real RAM credentials or scene-id. Production (SPRING_PROFILES_ACTIVE=prod)
  # enforces real values via RealnameProviderStartupValidator (spec T11).
  realname:
    dev-bypass: true
    # DEK is a dummy 32-zero-byte key (base64-encoded) — EnvDekCipherService
    # boots cleanly but bypass mode short-circuits before any encrypt call,
    # so the dummy key never touches real PII. Generate a real key for any
    # non-bypass dev experiment: `head -c 32 /dev/urandom | base64`.
    dek:
      base64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    # Pepper for idCardHash — fed into sha256(idCardNo || pepper) to defeat
    # rainbow tables on the 18-digit ID card space. Dev value is a literal
    # string; production uses MBW_REALNAME_PEPPER env var (any high-entropy
    # value, e.g. `head -c 32 /dev/urandom | base64`).
    pepper:
      value: dev-realname-pepper
