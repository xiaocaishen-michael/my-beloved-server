name: Nightly Full Tests

# Second-line defense for the CI tier strategy in ci.yml. Two jobs:
#
# 1. full-tests — `-Pfull-tests` (slow @Tag perf / timing-defense ITs)
#    PR skips, main push runs. This is third-pass for slow tests.
#
# 2. trivy-image — Docker image CVE scan
#    PR skips, main push runs. This is third-pass for image scan AND
#    catches CVE feed updates (same image, freshly disclosed CVE).
#
# Schedule: 19:00 UTC = 03:00 Asia/Shanghai. On any job fail, opens a
# GitHub Issue tagged `ci-regression`.

on:
  schedule:
    # 19:00 UTC daily = 03:00 Asia/Shanghai (Beijing time)
    - cron: '0 19 * * *'
  # Manual trigger for testing the workflow itself
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # for opening regression issues

jobs:
  full-tests:
    name: Nightly full-tests (incl. @Tag("slow"))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven verify -Pfull-tests
        run: ./mvnw -B -ntp verify -Pfull-tests

      - name: Open regression issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly full-tests failed (${today})`,
              body: [
                `Nightly cron run of \`-Pfull-tests\` failed.`,
                ``,
                `**Run**: ${runUrl}`,
                ``,
                `**Likely cause**: a P95 / timing-defense IT regression that PR-tier CI skipped or that flaked into a pass on main push CI.`,
                ``,
                `**Action**: triage the failed test, decide if it's a real regression vs flake. Real regression → revert offending commit + open fix PR.`,
                ``,
                `_(Auto-opened by nightly-full-tests.yml; close after triage.)_`,
              ].join('\n'),
              labels: ['ci-regression'],
            });

  trivy-image:
    name: Nightly Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t mbw-app:nightly .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'mbw-app:nightly'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Open CVE issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly Trivy image scan found CRITICAL/HIGH CVE (${today})`,
              body: [
                `Nightly cron Trivy scan of the freshly-built mbw-app image failed.`,
                ``,
                `**Run**: ${runUrl}`,
                ``,
                `**Likely cause**: a newly-disclosed CRITICAL/HIGH CVE landed in the CVE feed against a base-image package or a transitive Java dep. The image content has not changed — the threat model has.`,
                ``,
                `**Action**: open the run, see Trivy table for the CVE id + affected package. Bump base image (eclipse-temurin:21-jre tag) or upgrade the Maven dep that pulls the affected jar. If unfixed upstream, evaluate whether \`ignore-unfixed: true\` already covers it; if not, an exception entry may be needed.`,
                ``,
                `_(Auto-opened by nightly-full-tests.yml; close after triage.)_`,
              ].join('\n'),
              labels: ['ci-regression', 'security'],
            });
