name: Nightly Full Tests

# Second-line defense for the CI tier strategy in ci.yml:
#   - PR runs skip @Tag("slow") perf / timing-defense ITs (fast feedback)
#   - main push runs include them (catches regressions ~10min after merge)
#   - this nightly run is a third pass — catches anything the main push
#     missed (e.g., flaky-then-passed slow tests that shipped a real
#     regression, or a regression that landed via a dependency update)
#
# Schedule: 19:00 UTC = 03:00 Asia/Shanghai. On fail, opens a GitHub
# Issue tagged `ci-regression` so it shows up in the issue tracker
# without needing Slack.

on:
  schedule:
    # 19:00 UTC daily = 03:00 Asia/Shanghai (Beijing time)
    - cron: '0 19 * * *'
  # Manual trigger for testing the workflow itself
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # for opening regression issues

jobs:
  full-tests:
    name: Nightly full-tests (incl. @Tag("slow"))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven verify -Pfull-tests
        run: ./mvnw -B -ntp verify -Pfull-tests

      - name: Open regression issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly full-tests failed (${today})`,
              body: [
                `Nightly cron run of \`-Pfull-tests\` failed.`,
                ``,
                `**Run**: ${runUrl}`,
                ``,
                `**Likely cause**: a P95 / timing-defense IT regression that PR-tier CI skipped or that flaked into a pass on main push CI.`,
                ``,
                `**Action**: triage the failed test, decide if it's a real regression vs flake. Real regression → revert offending commit + open fix PR.`,
                ``,
                `_(Auto-opened by nightly-full-tests.yml; close after triage.)_`,
              ].join('\n'),
              labels: ['ci-regression'],
            });
