name: Build & Push Image

# Triggered when:
#   - a release tag (v*.*.*) is pushed (release-please's tag step)
#   - manually via workflow_dispatch (hotfix path; pick a tag/branch)
#
# Build mvn package on the GHA runner (4-vCPU, fast disk, no cross-AZ
# concerns), then docker build + push to Aliyun Container Registry
# (cn-shanghai). The Aliyun ACR was chosen over ghcr.io because deploy
# (ECS pulling) latency dominates user-perceived deploy time, and ACR
# intranet pull (~5s for 180MB) is 100x faster than ghcr.io's
# international-link pull (no docker-mirror covers ghcr.io).
#
# See meta repo Phase 4 plan for the full ROI analysis.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build (e.g. v0.1.5 or hotfix-x)"
        required: true
        type: string

permissions:
  contents: read

env:
  ACR_REGISTRY: crpi-uy44w7zpjef3f9w1.cn-shanghai.personal.cr.aliyuncs.com
  ACR_NAMESPACE: mbw_xcs
  ACR_REPOSITORY: mbw-app

jobs:
  build-and-push:
    name: Build & Push to Aliyun ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          # tag arg from workflow_dispatch wins; otherwise use the pushed git tag
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${TAG}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven package (skip tests — CI workflow already ran them)
        run: ./mvnw -B -ntp -pl mbw-app -am package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Two tags: the version (immutable) + 'latest' (moving pointer
          # to current production). Production deploys reference the
          # version tag; 'latest' is for ad-hoc local pulls.
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:latest
          # GHA cache speeds up subsequent runs (Docker layer reuse).
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single architecture for now — ECS is amd64. Multi-arch later
          # if we need ARM-based ECS or local Apple Silicon dev.
          platforms: linux/amd64

      - name: Image pushed
        run: |
          echo "✅ Image pushed:"
          echo "  ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
          echo "  ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:latest"
