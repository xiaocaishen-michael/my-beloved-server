name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven verify (compile + test + spotless + checkstyle + jacoco)
        run: ./mvnw -B -ntp verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'
          retention-days: 7
          if-no-files-found: ignore

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy fs scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy fs scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'docs,spec,.specify,.claude'

  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t mbw-app:ci .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'mbw-app:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
