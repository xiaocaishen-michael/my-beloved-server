name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Ruleset binding: each job's `name:` below is wired into the
# main-protection ruleset's required_status_checks contexts.
# Renaming any of them MUST update the ruleset in the SAME PR
# (gh api -X PUT /repos/.../rulesets/<id>), or PRs are permanently
# blocked. See docs/conventions/git-workflow.md (PR #25/#26 incident).
jobs:
  build:
    name: Build & Test  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Maven verify (compile + test + spotless + checkstyle + jacoco)
        # Tier strategy:
        #   - PR (pull_request): skip @Tag("slow") perf / timing-defense ITs
        #     (~5 min worth) so feedback loop stays under ~3 min
        #   - main push: include slow via `-Pfull-tests` — catches P95 /
        #     timing regression after auto-merge, ~10min revert window
        #   - nightly cron (nightly-full-tests.yml): full-tests as
        #     second-line defense in case main push slipped
        # Acceptable at M1.2 (no real users); revisit M3+ pre-launch.
        run: ./mvnw -B -ntp verify ${{ github.event_name == 'push' && '-Pfull-tests' || '' }}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'
          retention-days: 7
          if-no-files-found: ignore

  gitleaks:
    name: Gitleaks  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy fs scan  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy fs scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'docs,spec,.specify,.claude'

  # Tier strategy (per docs/conventions/ci-tiering.md, mirroring slow tests):
  #   - PR: skip (docker build + image scan = ~2min, no value pre-merge
  #     since fs scan already covers source-level + Dockerfile didn't
  #     change in most PRs)
  #   - main push: run (catches base-image / dep CVE on the freshly
  #     merged commit, ~10min revert window if regression)
  #   - nightly cron (nightly-full-tests.yml): run (catches CVE feed
  #     updates — same image stale today, vulnerable tomorrow)
  # NOT in main-protection required_status_checks — PR doesn't run it.
  # Pre-M3-launch: revisit whether to gate PRs (cost vs catch latency).
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t mbw-app:ci .
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'mbw-app:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  hadolint:
    name: Hadolint (Dockerfile)  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

  actionlint:
    name: Actionlint (workflow YAML)  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  markdownlint:
    name: Markdownlint (docs)  # ruleset-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint-cli2.jsonc
          globs: "**/*.md"

  commitlint:
    name: Commitlint (conventional commits)  # ruleset-required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  pr-title:
    name: PR title (conventional commits)  # ruleset-required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
