version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    # Boot 4 / Modulith 2 are deferred per ADR-0001 + scaffolding decision
    # (Modulith 2.x compat with Boot 4 verified at M3). Ignore major bumps
    # for now; patch/minor still proposed.
    # springdoc 3.x requires Spring Boot 4 (autoconfigure repackaged); pin
    # to 2.x until the Boot 4 wave (PR #109 verified the breakage).
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.modulith:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springdoc:*"
        update-types: ["version-update:semver-major"]
      # logstash-logback-encoder 9.x switched to Jackson 3.x
      # (tools.jackson.core), pulling in HIGH CVEs that block Trivy.
      # Stay on 8.x until the Boot 4 / Jackson 3 ecosystem wave (M3+).
      - dependency-name: "net.logstash.logback:*"
        update-types: ["version-update:semver-major"]
    # Reduce PR noise by grouping related dependencies into single PRs.
    groups:
      spring:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework.modulith:*"
      lint-tools:
        patterns:
          - "com.diffplug.spotless:*"
          - "com.puppycrawl.tools:*"
          - "org.jacoco:*"
          - "com.tngtech.archunit:*"
      springdoc:
        patterns:
          - "org.springdoc:*"
      test-tools:
        patterns:
          - "org.testcontainers:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
