# Nginx reverse proxy for the App node (M1 A-Split).
#
# `/etc/letsencrypt` is mounted from a Docker volume; cert files are
# placed there by certbot running on the host (see ops/runbook/first-deploy.md
# § HTTPS 证书).
#
# default_server on port 80 returns 444 to bare-IP / unknown-Host hits —
# avoids leaking the app to anyone scanning the IP, and forces all real
# traffic through the api.xiaocaishen.me virtual host.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    # Self-signed snake-oil cert for default_server is fine — clients hitting
    # bare IP get 444 before TLS body is exchanged in practice. Still need a
    # cert path or nginx refuses to start; reuse the real cert is OK because
    # default_server only returns 444 anyway.
    ssl_certificate /etc/letsencrypt/live/api.xiaocaishen.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xiaocaishen.me/privkey.pem;
    return 444;
}

# Plain HTTP for api.xiaocaishen.me — redirects everything except
# Let's Encrypt acme-challenge.
server {
    listen 80;
    listen [::]:80;
    server_name api.xiaocaishen.me;

    # Liveness probe for the nginx container's own healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt http-01 challenge (when cert lives on host /var).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy to the Spring Boot app.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.xiaocaishen.me;

    ssl_certificate /etc/letsencrypt/live/api.xiaocaishen.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xiaocaishen.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — opt in once cert renewal is verified working.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block /actuator/* by default; whitelist /actuator/health for SLB
    # health probes. Prometheus scrape (/actuator/prometheus) is M3 work
    # and stays blocked here until we have an internal-only consumer.
    location = /actuator/health {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /actuator/ {
        return 404;
    }

    # Default: reverse proxy everything else.
    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
