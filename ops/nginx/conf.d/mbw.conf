# Nginx reverse proxy for the App node (M1 A-Split).
#
# Edit `server_name` to the real domain on first deploy (Phase 3 runbook).
# `/etc/letsencrypt` is mounted from a Docker volume; cert files are
# placed there by certbot running on the host.

# Plain HTTP — redirects everything except cert renewal challenges.
server {
    listen 80;
    listen [::]:80;
    server_name api.mbw.example.com;

    # Liveness probe for the nginx container's own healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt http-01 challenge (when cert lives on host /var).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy to the Spring Boot app.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.mbw.example.com;

    ssl_certificate /etc/letsencrypt/live/api.mbw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mbw.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — opt in once cert renewal is verified working.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block /actuator/* by default; whitelist /actuator/health for SLB
    # health probes. Prometheus scrape (/actuator/prometheus) is M3 work
    # and stays blocked here until we have an internal-only consumer.
    location = /actuator/health {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /actuator/ {
        return 404;
    }

    # Default: reverse proxy everything else.
    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
