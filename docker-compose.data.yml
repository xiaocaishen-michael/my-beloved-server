# [FUTURE-SPLIT REFERENCE — NOT ACTIVE IN M1]
#
# A-Split topology Data-node compose. Originally ADR-0012 (Accepted
# 2026-04-29) but **superseded 2026-04-30** when M1 reverted to
# A-Tight single-node — see meta repo
# docs/adr/0012-deployment-a-split.md § Amendment 2026-04-30.
#
# This file is preserved as the implementation reference for a future
# split. M1 production uses docker-compose.tight.yml (single ECS).
#
# Original security model (kept for future reference): this Data node
# has NO public ingress. Postgres / Redis ports bound to all interfaces
# inside the container, but Aliyun security group + ufw on the host
# MUST whitelist only the App node's intranet IP. Any public exposure
# of 5432 / 6379 is a critical misconfiguration.
#
# Original usage (kept for future reference):
#   docker compose -f docker-compose.data.yml --env-file .env.data up -d

name: mbw-data

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mbw
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command:
      # Tune for a 2c2g host with PG as the main memory consumer.
      - "postgres"
      - "-c"
      - "shared_buffers=384MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - mbw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d mbw"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - "redis-server"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
    volumes:
      - mbw-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mbw-pgdata:
  mbw-redisdata:
